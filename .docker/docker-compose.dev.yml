# .docker/docker-compose.dev.yml
# 統一設備管理平台 — 本地開發環境 (All-in-One)
#
# ── 資料庫架構說明 ──────────────────────────────────────────────
#  為了解決公司網域限制問題，所有資料庫（PostgreSQL, KeyDB, ScyllaDB）
#  皆在本地 Docker 運行。只要有 Docker 和這份檔案，
#  在家裡或公司都能獲得 100% 一致的開發環境。
#
# ── 啟動指令 ───────────────────────────────────────────────────
#  docker compose --env-file .env.dev -f .docker/docker-compose.dev.yml up -d
#
# ────────────────────────────────────────────────────────────────

services:

  # ============================================
  # PostgreSQL 17（主持久層）
  # ============================================
  postgres:
    image: postgres:17-alpine
    container_name: udm-postgres
    restart: unless-stopped
    environment:
      # POSTGRES_USER / POSTGRES_DB 有安全預設值，POSTGRES_PASSWORD 強制從 .env.dev 讀取
      # 若未設定 POSTGRES_PASSWORD，docker compose 將直接報錯，避免以空密碼啟動
      POSTGRES_USER: ${POSTGRES_USER:-udm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?請在 .env.dev 設定 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iot_platform}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-udm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # KeyDB（快取 + 在線狀態）
  # ============================================
  keydb:
    image: eqalpha/keydb:latest
    container_name: udm-keydb
    restart: unless-stopped
    command: keydb-server --appendonly yes
    volumes:
      - keydb_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "keydb-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # ScyllaDB（遙測時序資料）
  # ============================================
  scylladb:
    image: scylladb/scylla:latest
    container_name: udm-scylladb
    restart: unless-stopped
    command: --smp 1 --memory 512M --overprovisioned 1
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================
  # ScyllaDB Keyspace 初始化
  # ============================================
  scylladb-init:
    image: scylladb/scylla:latest
    container_name: udm-scylladb-init
    depends_on:
      scylladb:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating ScyllaDB keyspace: ${SCYLLA_KEYSPACE}"
        cqlsh scylladb 9042 -e "
          CREATE KEYSPACE IF NOT EXISTS ${SCYLLA_KEYSPACE}
          WITH replication = {'class': 'NetworkTopologyStrategy', 'datacenter1': 1}
          AND durable_writes = true;
        "
        echo "ScyllaDB keyspace '${SCYLLA_KEYSPACE}' ready!"
    restart: "no"

volumes:
  pg_data:
  keydb_data:
  scylla_data:
